apiVersion: apps/v1
kind: Deployment
metadata:
  name: nectar-api
  labels:
    app: nectar-api
spec:
  replicas: 3  # Start with 3 replicas, can scale up
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nectar-api
  template:
    metadata:
      labels:
        app: nectar-api
    spec:
      containers:
      - name: nectar-api
        image: nectar-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        # Database configuration
        - name: DB_TYPE
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: db-type
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: db-host
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: db-name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: db-password
        # Redis configuration
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: nectar-secrets
              key: redis-url
        # Health check configuration
        - name: HEALTH_CHECK_DB
          value: "true"
        - name: HEALTH_CHECK_REDIS
          value: "true"
        # Resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
---
apiVersion: v1
kind: Service
metadata:
  name: nectar-api-service
spec:
  type: ClusterIP
  selector:
    app: nectar-api
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nectar-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nectar-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
