# Example nginx config for perfumenectar.com (frontend)
# This config serves the built frontend files with proper MIME types
#
# 1. Copy to your nginx sites (e.g. /etc/nginx/sites-available/perfumenectar.com)
# 2. Update the root path to point to your built frontend dist directory
# 3. Update server_name to match your domain
# 4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name perfumenectar.com www.perfumenectar.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name perfumenectar.com www.perfumenectar.com;

    # SSL configuration (update with your certificate paths)
    ssl_certificate /etc/letsencrypt/live/perfumenectar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perfumenectar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root directory - update this to your frontend build directory
    root /home/ubuntu/Nectar/your-dream-website/dist;
    index index.html;

    # CRITICAL: Include mime.types and set default
    # This ensures proper MIME types for all files
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CRITICAL: Fix MIME types for JavaScript modules
    # This fixes the "Expected a JavaScript-or-Wasm module script" error
    # The types{} block inside location overrides the default MIME type
    location ~* \.(js|mjs)$ {
        # Override MIME type - this is the key fix!
        types {
            application/javascript js mjs;
        }
        default_type application/javascript;
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # CSS files
    location ~* \.css$ {
        add_header Content-Type "text/css; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # JSON files
    location ~* \.json$ {
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600";
        expires 1h;
    }

    # Font files
    location ~* \.(woff2|woff|ttf|eot|otf)$ {
        add_header Content-Type "font/woff2" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # Images
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
        access_log off;
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass https://api.perfumenectar.com;
        proxy_http_version 1.1;
        proxy_set_header Host api.perfumenectar.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        
        # CORS headers (backend should handle this, but ensure they pass through)
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        
        proxy_buffering off;
    }

    # Serve static files with proper MIME types
    location / {
        try_files $uri $uri/ /index.html;
        
        # Ensure HTML files have correct Content-Type
        location ~* \.html$ {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires -1;
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
