# Production nginx config for perfumenectar.com (frontend)
# This config serves the built frontend files with proper MIME types
# CRITICAL: Static assets MUST be served before SPA fallback

server {
    listen 80;
    listen [::]:80;
    server_name perfumenectar.com www.perfumenectar.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name perfumenectar.com www.perfumenectar.com;

    # SSL configuration (update with your certificate paths)
    ssl_certificate /etc/letsencrypt/live/perfumenectar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/perfumenectar.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Root directory - update this to your frontend build directory
    root /home/ubuntu/Nectar/your-dream-website/dist;
    index index.html;

    # CRITICAL: Include mime.types FIRST
    # This ensures proper MIME types for all files
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CRITICAL: Proxy API requests FIRST (before static files)
    # This ensures /api routes are never caught by static file serving
    location /api {
        proxy_pass https://api.perfumenectar.com;
        proxy_http_version 1.1;
        proxy_set_header Host api.perfumenectar.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        
        # CORS headers
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        
        proxy_buffering off;
    }

    # CRITICAL: Serve /assets/ directory as static files FIRST
    # This prevents SPA fallback from catching asset requests
    location /assets/ {
        # Cache headers
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        
        # Serve files directly, no fallback
        try_files $uri =404;
    }

    # CRITICAL: JavaScript and module files - MUST come before location /
    # This ensures .js/.mjs files are served with correct MIME type
    location ~* \.(js|mjs)$ {
        # Override MIME type - this is the key fix!
        types {
            application/javascript js mjs;
        }
        default_type application/javascript;
        
        # Set explicit Content-Type header
        add_header Content-Type "application/javascript; charset=utf-8" always;
        
        # Cache headers
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        
        # Serve file directly, no fallback to index.html
        try_files $uri =404;
    }

    # CSS files - MUST come before location /
    location ~* \.css$ {
        types {
            text/css css;
        }
        default_type text/css;
        
        add_header Content-Type "text/css; charset=utf-8" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        
        # Serve file directly, no fallback
        try_files $uri =404;
    }

    # JSON files
    location ~* \.json$ {
        types {
            application/json json;
        }
        default_type application/json;
        
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
        
        try_files $uri =404;
    }

    # Font files
    location ~* \.(woff2|woff|ttf|eot|otf)$ {
        types {
            font/woff2 woff2;
            font/woff woff;
            font/truetype ttf;
            application/vnd.ms-fontobject eot;
            font/opentype otf;
        }
        default_type font/woff2;
        
        add_header Content-Type "font/woff2" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        
        try_files $uri =404;
    }

    # Images - MUST come before location /
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        expires 1y;
        access_log off;
        
        # Serve file directly, no fallback
        try_files $uri =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA fallback - MUST be LAST
    # Only applies to routes that don't match static files above
    location / {
        # Only serve index.html for routes, not for files
        try_files $uri $uri/ /index.html;
        
        # Ensure HTML files have correct Content-Type
        location ~* \.html$ {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
        }
    }
}
