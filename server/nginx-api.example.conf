# Example nginx config for api.perfumenectar.com
# Use this so browser requests (including OPTIONS preflight) reach the Node app and get CORS headers.
#
# 1. Copy to your nginx sites (e.g. /etc/nginx/sites-available/api.perfumenectar.com)
# 2. Set upstream to your Node app. Backend default port is 3000 (server .env PORT).
#    If you get 502, check: tail /var/log/nginx/error.log; ss -lntp; curl http://127.0.0.1:3000/health
#    Then set server below to the port your Node process actually listens on.
# 3. sudo nginx -t && sudo systemctl reload nginx
#
# If behind Cloudflare: do NOT block OPTIONS; ensure "Cache Level" for API routes does not
# strip CORS headers. Use "Bypass" or "Standard" and ensure Origin/response headers pass through.

upstream nectar_api {
    server 127.0.0.1:3000;  # must match backend PORT (default 3000); fix this if you get 502
    keepalive 64;
}

server {
    listen 443 ssl;
    server_name api.perfumenectar.com;

    # SSL config (certbot, etc.) - add your ssl_certificate lines here

    # Proxy all API and health requests to Node – Node will add CORS headers
    # CRITICAL: Forward ALL requests (including OPTIONS) to Node.js for proper CORS handling
    location /api {
        # Forward ALL requests including OPTIONS to Node.js
        # Node.js will handle CORS validation and headers
        proxy_pass http://nectar_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # CRITICAL: Forward Origin header so Node.js can validate it
        proxy_set_header Origin $http_origin;
        
        # Ensure CORS headers from Node.js are passed through
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Max-Age;
        
        # Don't buffer responses - send headers immediately
        proxy_buffering off;
    }

    location /health {
        # Forward to Node.js - it handles CORS
        proxy_pass http://nectar_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_buffering off;
    }

    location / {
        # Forward to Node.js - it handles CORS
        proxy_pass http://nectar_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
        proxy_buffering off;
    }
}
